<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品保部系統 — 專案管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--surface:#fff;--surface2:#f8fafc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-text:#1d4ed8;
  --success:#16a34a;--success-bg:#f0fdf4;--success-text:#15803d;
  --warn:#d97706;--warn-bg:#fffbeb;--warn-text:#92400e;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-text:#991b1b;
  --gray-bg:#f1f5f9;--gray-text:#475569;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;}

/* ── LAYOUT ── */
.app{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.main{flex:1;overflow-y:auto;padding:28px 32px;}

/* ── SIDEBAR ── */
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sb-logo h2{font-size:15px;font-weight:700;color:var(--text);}
.sb-logo .role-badge{display:inline-block;margin-top:5px;font-size:11px;padding:2px 8px;background:var(--warn-bg);color:var(--warn-text);border-radius:20px;font-weight:600;}
.sb-section{padding:16px 12px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius);margin:1px 6px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .15s;}
.sb-item:hover{background:var(--surface2);}
.sb-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:600;}
.sb-item svg{width:16px;height:16px;flex-shrink:0;}
.sb-divider{height:1px;background:var(--border);margin:8px 12px;}
.sb-proj-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--radius);margin:1px 6px;font-size:12px;color:var(--text2);cursor:pointer;}
.sb-proj-item:hover{background:var(--surface2);}
.sb-proj-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.av-sm{width:26px;height:26px;font-size:10px;}
.av-blue{background:#dbeafe;color:#1d4ed8;}
.av-green{background:#dcfce7;color:#15803d;}
.av-purple{background:#f3e8ff;color:#7e22ce;}
.av-amber{background:#fef3c7;color:#92400e;}
.av-rose{background:#ffe4e6;color:#9f1239;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.topbar h1{font-size:20px;font-weight:700;}
.topbar-right{display:flex;gap:10px;align-items:center;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#1d4ed8;}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-danger:hover{background:#b91c1c;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border);}
.icon-btn{width:30px;height:30px;padding:0;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.icon-btn:hover{background:var(--surface2);}
.icon-btn.danger:hover{background:var(--danger-bg);color:var(--danger);border-color:#fca5a5;}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-label{font-size:12px;color:var(--text2);margin-bottom:6px;}
.stat-val{font-size:26px;font-weight:700;color:var(--text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px;}

/* ── TABLE CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:700;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;}
.search-box input{border:none;background:transparent;outline:none;font-size:13px;color:var(--text);width:180px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:1px solid var(--border);}
td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.pill-dot{width:6px;height:6px;border-radius:50%;}
.pill-green{background:var(--success-bg);color:var(--success-text);}
.pill-green .pill-dot{background:var(--success);}
.pill-amber{background:var(--warn-bg);color:var(--warn-text);}
.pill-amber .pill-dot{background:var(--warn);}
.pill-gray{background:var(--gray-bg);color:var(--gray-text);}
.pill-gray .pill-dot{background:#94a3b8;}
.pill-red{background:var(--danger-bg);color:var(--danger-text);}
.pill-red .pill-dot{background:var(--danger);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;width:min(520px,95vw);box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:16px;font-weight:700;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border .15s;}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px;}

/* ── USER MODAL ── */
.user-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;margin-bottom:16px;}
.user-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);}
.user-info{flex:1;}
.user-name{font-size:13px;font-weight:600;}
.user-role{font-size:11px;color:var(--text3);}

/* ── CONFIRM MODAL ── */
.confirm-modal{max-width:400px;}
.confirm-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.confirm-icon.danger{background:var(--danger-bg);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;color:#fff;background:#1e293b;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
#toast.success{background:var(--success);}
#toast.error{background:var(--danger);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px;}

/* ── SWITCHER ── */
.proj-switcher{position:relative;}
.switcher-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);width:220px;z-index:100;overflow:hidden;}
.switcher-dropdown.open{display:block;}
.sw-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-size:13px;}
.sw-item:hover{background:var(--surface2);}
.sw-item .dot{width:8px;height:8px;border-radius:50%;}
</style>
</head>
<body>
<div id="pwGate" style="position:fixed;inset:0;background:#1e293b;z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);">
    <div style="font-size:48px;margin-bottom:12px;">⚙️</div>
    <div style="font-size:20px;font-weight:700;color:#1e293b;margin-bottom:4px;">Super Admin</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:24px;">請輸入管理員密碼</div>
    <input id="pwInput" type="password" placeholder="密碼" 
      onkeydown="if(event.key==='Enter')checkPw()"
      style="width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;outline:none;margin-bottom:8px;box-sizing:border-box;">
    <div id="pwErr" style="color:#ef4444;font-size:12px;min-height:18px;margin-bottom:12px;"></div>
    <button onclick="checkPw()" 
      style="width:100%;padding:13px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;">
      進入管理
    </button>
  </div>
</div>
<script>
var ADMIN_PW = 'AdminBrinc2024';
function checkPw(){
  var v = document.getElementById('pwInput').value;
  if(v === ADMIN_PW){
    document.getElementById('pwGate').style.display = 'none';
    init();
  } else {
    document.getElementById('pwErr').textContent = '密碼錯誤，請重試';
    document.getElementById('pwInput').select();
  }
}
window.addEventListener('load', function(){ document.getElementById('pwInput').focus(); });
</script>


<!-- TOAST -->
<div id="toast"></div>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">
      <h2>品保部系統</h2>
      <span class="role-badge">⭐ Super Admin</span>
    </div>

    <div class="sb-section">管理</div>
    <div class="sb-item active" onclick="showSection('projects')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/><path d="M3 7l9 6 9-6"/></svg>
      專案管理
    </div>
    <div class="sb-item" onclick="showSection('users')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
      使用者管理
    </div>

    <div class="sb-divider"></div>
    <div class="sb-section">切換至專案</div>
    <div id="sbProjList"></div>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="avatar av-amber">SA</div>
        <div>
          <div style="font-size:12px;font-weight:600;">Super Admin</div>
          <div style="font-size:11px;color:var(--text3);">全專案權限</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- ── 專案管理 section ── -->
    <div id="section-projects">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <h1>專案管理</h1>
          <span id="projCount" style="background:var(--accent-bg);color:var(--accent-text);font-size:12px;padding:2px 10px;border-radius:20px;font-weight:600;"></span>
        </div>
        <div class="topbar-right">
          <button class="btn" onclick="exportProjects()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            匯出
          </button>
          <button class="btn btn-primary" onclick="openAddProject()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新增專案
          </button>
        </div>
      </div>

      <!-- STATS -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">專案總數</div>
          <div class="stat-val" id="statTotal">0</div>
          <div class="stat-sub">含所有狀態</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">使用中</div>
          <div class="stat-val" id="statActive" style="color:var(--success)">0</div>
          <div class="stat-sub">正常運作中</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">試用中</div>
          <div class="stat-val" id="statTrial" style="color:var(--warn)">0</div>
          <div class="stat-sub">試用期間</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">帳號總數</div>
          <div class="stat-val" id="statUsers">0</div>
          <div class="stat-sub">所有專案合計</div>
        </div>
      </div>

      <!-- FILTER + TABLE -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">專案列表</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="search-box">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="projSearch" placeholder="搜尋專案名稱或代碼..." oninput="renderProjects()">
            </div>
            <select id="statusFilter" onchange="renderProjects()" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);">
              <option value="">全部狀態</option>
              <option value="使用中">使用中</option>
              <option value="試用中">試用中</option>
              <option value="設定中">設定中</option>
              <option value="已停用">已停用</option>
            </select>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:44px;">#</th>
              <th>專案名稱</th>
              <th style="width:110px;">代碼</th>
              <th style="width:90px;">使用者</th>
              <th style="width:80px;">建立日期</th>
              <th style="width:90px;">狀態</th>
              <th style="width:130px;">操作</th>
            </tr>
          </thead>
          <tbody id="projTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ── 使用者管理 section ── -->
    <div id="section-users" style="display:none;">
      <div class="topbar">
        <h1>使用者管理</h1>
        <div class="topbar-right">
          <button class="btn btn-primary" onclick="openAddUser()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新增使用者
          </button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">所有使用者</div>
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="userSearch" placeholder="搜尋帳號或姓名..." oninput="renderUsers()">
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>使用者</th>
              <th>帳號</th>
              <th>所屬專案</th>
              <th style="width:70px;">系統</th>
              <th style="width:90px;">角色</th>
              <th style="width:90px;">狀態</th>
              <th style="width:110px;">操作</th>
            </tr>
          </thead>
          <tbody id="userTbody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<!-- ── 新增/編輯 專案 Modal ── -->
<div class="modal-overlay" id="projModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="projModalTitle">新增專案</h3>
      <button class="icon-btn" onclick="closeModal('projModal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>專案名稱 *</label>
          <input type="text" id="pName" placeholder="例：台灣精密工業品保部">
        </div>
        <div class="form-group">
          <label>專案代碼 *</label>
          <input type="text" id="pCode" placeholder="例：PRJ-A" style="text-transform:uppercase;">
          <div class="form-hint">英數字，建立後不可更改</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>聯絡人</label>
          <input type="text" id="pContact" placeholder="負責窗口姓名">
        </div>
        <div class="form-group">
          <label>聯絡信箱</label>
          <input type="email" id="pEmail" placeholder="email@example.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>狀態</label>
          <select id="pStatus">
            <option value="設定中">設定中</option>
            <option value="試用中">試用中</option>
            <option value="使用中">使用中</option>
            <option value="已停用">已停用</option>
          </select>
        </div>
        <div class="form-group">
          <label>顏色標記</label>
          <select id="pColor">
            <option value="blue">藍色</option>
            <option value="green">綠色</option>
            <option value="purple">紫色</option>
            <option value="amber">橙色</option>
            <option value="rose">紅色</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>備註</label>
        <textarea id="pNote" rows="2" placeholder="專案說明或備忘..." style="resize:vertical;min-height:60px;"></textarea>
      </div>
      <div class="form-group">
        <label>品牌 Logo</label>
        <div style="display:flex;align-items:center;gap:14px;">
          <div id="logoPreview" style="width:64px;height:64px;border:1px dashed var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--surface2);flex-shrink:0;">
            <span style="font-size:11px;color:var(--text3);">無</span>
          </div>
          <div>
            <input type="file" id="pLogoInput" accept="image/*" style="display:none;" onchange="previewLogo(this)">
            <button class="btn btn-ghost btn-sm" type="button" onclick="document.getElementById('pLogoInput').click()">📁 上傳圖片</button>
            <button class="btn btn-ghost btn-sm" type="button" onclick="clearLogo()" style="margin-left:6px;">✕ 清除</button>
            <div class="form-hint" style="margin-top:6px;">建議使用正方形圖片，PNG/JPG 均可</div>
          </div>
        </div>
      </div>
    </div>

<script>
// ══════════════════════════════
// API CONFIG
// ══════════════════════════════
const API_BASE = 'https://brinc-iqc-fn.azurewebsites.net/api';
const API_KEY  = '255hf7LaWXm0QIn-wE7U4MH8_-MScT9Vhiq7Z_BnJr8iAzFu-6hxbg==';
async function apiFetch(method, path, body){
  const opts = {method, headers:{'Content-Type':'application/json','x-functions-key':API_KEY}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, opts);
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||'HTTP '+r.status); }
  return r.json();
}

// ══════════════════════════════
// DATA
// ══════════════════════════════
const COLORS = {
  blue:   {bg:'#dbeafe',text:'#1d4ed8'},
  green:  {bg:'#dcfce7',text:'#15803d'},
  purple: {bg:'#f3e8ff',text:'#7e22ce'},
  amber:  {bg:'#fef3c7',text:'#92400e'},
  rose:   {bg:'#ffe4e6',text:'#9f1239'},
};

let projects = [];
let users = [];

let editingProjId = null;
let _editingLogo = null;
let editingUserId = null;
let editingUserSys = null;
let currentUsersProjectId = null;

// ══════════════════════════════
// INIT
// ══════════════════════════════
async function apiFetchProj(method, path, projId, body){
  const opts = {method, headers:{'Content-Type':'application/json','x-functions-key':API_KEY,'x-project-id':projId}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API_BASE + path, opts);
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||'HTTP '+r.status); }
  return r.json();
}
async function loadData(){
  try {
    const projs = await apiFetch('GET', '/projects');
    projects = (projs||[]).map(p=>({
      id: p.project_id, code: p.project_id,
      name: p.name, status: p.status||'使用中',
      color: p.color||'blue', contact: p.contact||'',
      email: p.email||'', note: p.note||'',
      createdAt: (p.created_at||'').split('T')[0],
    }));

    // IQC users（後端無 project_id 過濾，直接抓一次）
    let iqcUsers = [];
    try {
      const usrs = await apiFetch('GET', '/users');
      iqcUsers = (Array.isArray(usrs)?usrs:[]).map(u=>({
        id: u.id, name: u.displayName||u.username,
        username: u.username, role: u.role,
        projectId: u.projectId||'Brinc',
        status: (u.active===true||u.active===1)?'啟用':'停用', _sys:'iqc'
      }));
    } catch(ex){}

    // LAB users（後端欄位為 enabled，無 project_id 過濾）
    let labUsers = [];
    try {
      const lusrs = await apiFetch('GET', '/lab/users');
      labUsers = (Array.isArray(lusrs)?lusrs:[]).map(u=>({
        id: u.id, name: u.displayName||u.username,
        username: u.username, role: u.role,
        projectId: u.projectId||'Brinc',
        status: (u.enabled===true||u.enabled===1)?'啟用':'停用', _sys:'lab'
      }));
    } catch(ex){}

    users = [...iqcUsers, ...labUsers];
    renderProjects(); renderUsers(); renderSidebar();
    updateStats(); populateProjectSelect();
  } catch(e){ toast('載入失敗：'+e.message,'error'); }
}
function init(){ loadData(); }

function updateStats(){
  document.getElementById('statTotal').textContent  = projects.length;
  document.getElementById('statActive').textContent  = projects.filter(p=>p.status==='使用中').length;
  document.getElementById('statTrial').textContent   = projects.filter(p=>p.status==='試用中').length;
  document.getElementById('statUsers').textContent   = users.filter(u=>u.status==='啟用').length;
  document.getElementById('projCount').textContent   = projects.length + ' 個專案';
}

// ══════════════════════════════
// RENDER PROJECTS
// ══════════════════════════════
function renderProjects(){
  const q      = (document.getElementById('projSearch').value||'').toLowerCase();

    const matchQ = !q || p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q);

  const tbody = document.getElementById('projTbody');

    const c = COLORS[p.color]||COLORS.blue;

      '使用中':'pill-green','試用中':'pill-amber','設定中':'pill-gray','已停用':'pill-red'

    return `<tr style="${disabled?'opacity:.5':''}">
      <td style="color:var(--text3);font-size:12px;">${i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          ${avatarEl}
          <div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
            <div style="font-weight:600;">${p.name}</div>
            ${p.contact||p.email?`<div style="font-size:11px;color:var(--text3);white-space:nowrap;">${p.contact||''}${p.contact&&p.email?' · ':''}${p.email||''}</div>`:''}
          </div>
        </div>
      </td>
      <td><code style="font-size:12px;background:var(--surface2);padding:2px 7px;border-radius:4px;color:var(--text2);">${p.code}</code></td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="openUsersModal('${p.id}')" style="gap:4px;white-space:nowrap;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
          ${uc} 位
        </button>
      </td>
      <td style="font-size:12px;color:var(--text3);white-space:nowrap;">${p.createdAt}</td>
      <td style="white-space:nowrap;"><span class="pill ${statusPill}"><span class="pill-dot"></span>${p.status}</span></td>
      <td>
        <div style="display:flex;gap:4px;">
          <button class="icon-btn" title="編輯" onclick="openEditProject('${p.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn" title="切換至此專案" onclick="switchToProject('${p.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </button>
          <button class="icon-btn danger" title="${p.status==='已停用'?'啟用':'停用'}" onclick="toggleProject('${p.id}')">
            ${p.status==='已停用'
              ?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`
              :`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>`
            }
          </button>
          <button class="icon-btn danger" title="刪除專案" onclick="confirmDeleteProject('${p.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════
// RENDER USERS
// ══════════════════════════════

// ══════════════════════════════
// LOGO HELPERS
// ══════════════════════════════
function previewLogo(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 128;
      const scale = Math.min(MAX/img.width, MAX/img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      _editingLogo = canvas.toDataURL('image/jpeg', 0.75);
      updateLogoPreview(_editingLogo);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function updateLogoPreview(src){
  const el = document.getElementById('logoPreview');
  if(!el) return;
  if(src){
    el.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:contain;">`;
  } else {
    el.innerHTML = '<span style="font-size:11px;color:var(--text3);">無</span>';
  }
}
function clearLogo(){
  _editingLogo = '';
  updateLogoPreview(null);
  const inp = document.getElementById('pLogoInput');
  if(inp) inp.value='';
}

// ══════════════════════════════
// PROJECT CRUD
// ══════════════════════════════
function openAddProject(){
  editingProjId = null;
  document.getElementById('projModalTitle').textContent = '新增專案';
  ['pName','pCode','pContact','pEmail','pNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pStatus').value = '設定中';
  document.getElementById('pColor').value  = 'blue';
  document.getElementById('pCode').disabled = false;
  _editingLogo = null;
  updateLogoPreview(null);
  openModal('projModal');
}

function openEditProject(id){
  editingProjId = id;
  const p = projects.find(x=>x.id===id); if(!p) return;
  document.getElementById('projModalTitle').textContent = '編輯專案';
  document.getElementById('pName').value    = p.name;
  document.getElementById('pCode').value    = p.code;
  document.getElementById('pCode').disabled = true;
  document.getElementById('pContact').value = p.contact;
  document.getElementById('pEmail').value   = p.email;
  document.getElementById('pStatus').value  = p.status;
  document.getElementById('pColor').value   = p.color;
  document.getElementById('pNote').value    = p.note;
  const _storedLogo = localStorage.getItem('proj_logo_'+id)||'';
  _editingLogo = (_storedLogo.length < 100*1024) ? _storedLogo || null : null;
  if(_storedLogo && !_editingLogo) localStorage.removeItem('proj_logo_'+id); // 清掉超大的舊值
  updateLogoPreview(_editingLogo);
  openModal('projModal');
}

async function saveProject(){
  const name = document.getElementById('pName').value.trim();
  const code = document.getElementById('pCode').value.trim().toUpperCase();
  if(!name||!code){ toast('請填寫專案名稱和代碼','error'); return; }
  const data = {
    project_id: code, name,
    contact: document.getElementById('pContact').value.trim(),
    email:   document.getElementById('pEmail').value.trim(),
    status:  document.getElementById('pStatus').value,
    color:   document.getElementById('pColor').value,
    note:    document.getElementById('pNote').value.trim(),
  };
  try {
    if(editingProjId){
      await apiFetchProj('PUT', '/projects/'+editingProjId, editingProjId, data);
      toast('專案已更新');
    } else {
      await apiFetchProj('POST', '/projects', code, data);
      toast('專案已建立','success');
    }
    const savedId = editingProjId || code;
    if(_editingLogo !== null){
      try{ localStorage.setItem('proj_logo_'+savedId, _editingLogo||''); }
      catch(e){ localStorage.removeItem('proj_logo_'+savedId); toast('Logo 太大無法儲存，請選擇較小的圖片','error'); }
    }
    closeModal('projModal');
    await loadData();
  } catch(e){ toast('操作失敗：'+e.message,'error'); }
}

function toggleProject(id){
  const p = projects.find(x=>x.id===id); if(!p) return;
  const isDisabling = p.status!=='已停用';
  const uc = users.filter(u=>u.projectId===id&&u.status==='啟用').length;
  document.getElementById('confirmTitle').textContent = isDisabling ? '停用專案' : '重新啟用專案';
  document.getElementById('confirmMsg').textContent   = isDisabling
    ? `確定要停用「${p.name}」嗎？`
    : `確定要重新啟用「${p.name}」嗎？`;
  document.getElementById('confirmSub').textContent   = isDisabling && uc
    ? `此專案有 ${uc} 位使用中帳號，停用後將無法登入。`
    : '';
  document.getElementById('confirmBtn').textContent   = isDisabling ? '確認停用' : '確認啟用';
  document.getElementById('confirmBtn').onclick = async ()=>{
    const newStatus = isDisabling ? '已停用' : '使用中';
    try {
      await apiFetchProj('PUT', '/projects/'+id, id, {name:p.name,status:newStatus,color:p.color,contact:p.contact,email:p.email,note:p.note});
      closeModal('confirmModal');
      await loadData();
      toast(isDisabling ? `已停用：${p.name}` : `已啟用：${p.name}`);
    } catch(e){ toast('操作失敗：'+e.message,'error'); }
  };
  openModal('confirmModal');
}

function switchToProject(id){
  const p = projects.find(x=>x.id===id); if(!p) return;
  try{
    window.parent.postMessage({
      type:'saEnterProject',
      projectId: p.id,
      projects: projects.map(x=>({id:x.id, name:x.name}))
    }, '*');
  }catch(e){}
  toast('正在切換至：'+p.name+'...');
}

// ══════════════════════════════
// USERS MODAL
// ══════════════════════════════
function openUsersModal(projId){
  currentUsersProjectId = projId;
  const p = projects.find(x=>x.id===projId);
  document.getElementById('usersModalTitle').textContent = `${p?.name} — 使用者`;
  const list = users.filter(u=>u.projectId===projId);
  const el   = document.getElementById('usersModalList');
  if(!list.length){
    el.innerHTML = `<div style="text-align:center;color:var(--text3);padding:20px;font-size:13px;">尚無使用者</div>`;
  } else {
    el.innerHTML = list.map(u=>{
      const rolePill = {Admin:'pill-amber',LAB:'pill-green',PM:'pill-green',Guest:'pill-gray',admin:'pill-amber',iqc:'pill-green',guest:'pill-gray'}[u.role]||'pill-gray';
      const sysBadge = u._sys==='iqc'
        ? '<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;background:#dbeafe;color:#1d4ed8;margin-right:4px;">IQC</span>'
        : '<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;background:#f0fdf4;color:#15803d;margin-right:4px;">LAB</span>';
      return `<div class="user-row">
        <div class="avatar av-sm av-blue">${u.name[0]}</div>
        <div class="user-info">
          <div class="user-name">${u.name} <code style="font-size:11px;background:var(--surface2);padding:1px 5px;border-radius:4px;color:var(--text3);">${u.username}</code></div>
          <div class="user-role">${u.role} · ${u.status}</div>
        </div>
        ${sysBadge}<span class="pill ${rolePill}" style="font-size:10px;">${u.role}</span>
        <button class="icon-btn danger btn-sm" title="移除" onclick="confirmRemoveUser('${u._sys}',${u.id})" style="margin-left:4px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');
  }
  openModal('usersModal');
}

function openAddUserToProject(){
  closeModal('usersModal');
  editingUserId = null;
  document.getElementById('userModalTitle').textContent = '新增使用者';
  ['uName','uUsername','uPassword'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('uSystem').value = 'lab';
  onSystemChange();
  if(currentUsersProjectId) document.getElementById('uProject').value = currentUsersProjectId;
  document.getElementById('uProjectGroup').style.display = 'none';
  openModal('userModal');
}

// ══════════════════════════════
// USER CRUD
// ══════════════════════════════
function populateProjectSelect(){
  const sel = document.getElementById('uProject');
  sel.innerHTML = projects.map(p=>`<option value="${p.id}">${p.name} (${p.code})</option>`).join('');
}

function openAddUser(){
  editingUserId = null; editingUserSys = null;
  document.getElementById('userModalTitle').textContent = '新增使用者';
  ['uName','uUsername','uPassword'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('uSystem').value = 'lab';
  onSystemChange();
  document.getElementById('uProjectGroup').style.display = '';
  openModal('userModal');
}

function openEditUser(sys, id){
  editingUserId = id;
  editingUserSys = sys;
  const u = users.find(x=>x.id===id && x._sys===sys); if(!u) return;
  document.getElementById('userModalTitle').textContent = '編輯使用者';
  document.getElementById('uName').value     = u.name;
  document.getElementById('uUsername').value = u.username;
  document.getElementById('uPassword').value = '';
  document.getElementById('uSystem').value   = u._sys||'lab';
  onSystemChange();
  document.getElementById('uRole').value     = u.role;
  document.getElementById('uProject').value  = u.projectId||'';
  document.getElementById('uProjectGroup').style.display = '';
  openModal('userModal');
}

function onSystemChange(){
  const sys = document.getElementById('uSystem').value;
  const roleEl = document.getElementById('uRole');
  const labRoles = [{v:'Admin',l:'Admin'},{v:'LAB',l:'LAB'},{v:'PM',l:'PM'},{v:'Guest',l:'Guest'}];
  const iqcRoles = [{v:'admin',l:'管理者 (admin)'},{v:'iqc',l:'品檢員 (iqc)'},{v:'guest',l:'訪客 (guest)'}];
  const roles = sys==='iqc' ? iqcRoles : labRoles;
  roleEl.innerHTML = roles.map(r=>`<option value="${r.v}">${r.l}</option>`).join('');
}

async function saveUser(){
  const name     = document.getElementById('uName').value.trim();
  const username = document.getElementById('uUsername').value.trim();
  const password = document.getElementById('uPassword').value;
  const role     = document.getElementById('uRole').value;
  const sys      = document.getElementById('uSystem').value;
  const projId   = document.getElementById('uProject').value;
  if(!name||!username){ toast('請填寫姓名和帳號','error'); return; }
  if(!editingUserId && !password){ toast('請輸入初始密碼','error'); return; }
  const base = sys==='iqc' ? '/users' : '/lab/users';
  const body = sys==='lab'
    ? {displayName:name, username, role, enabled:true, projectId:projId||'Brinc'}
    : {displayName:name, username, role, active:true,  projectId:projId||'Brinc'};
  if(password) body.password = password;
  try {
    if(editingUserId){
      const putBase = (typeof editingUserSys!=='undefined'&&editingUserSys) ? (editingUserSys==='iqc'?'/users':'/lab/users') : base;
      await apiFetchProj('PUT', putBase+'/'+editingUserId, projId||'Brinc', body);
      toast('使用者已更新');
    } else {
      await apiFetchProj('POST', base, projId||'Brinc', body);
      toast('帳號已建立','success');
    }
    closeModal('userModal');
    await loadData();
  } catch(e){ toast('操作失敗：'+e.message,'error'); }
}

async function toggleUser(sys, id){
  const u = users.find(x=>x.id===id && x._sys===sys); if(!u) return;
  const newActive = u.status !== '啟用';
  const base = sys==='lab' ? '/lab/users' : '/users';
  const body = sys==='lab'
    ? { displayName:u.name, username:u.username, role:u.role, enabled:newActive }
    : { displayName:u.name, username:u.username, role:u.role, active:newActive };
  try {
    await apiFetchProj('PUT', base+'/'+id, u.projectId||'Brinc', body);
    toast(newActive ? '帳號已啟用：'+u.name : '帳號已停用：'+u.name, newActive?'success':'');
    await loadData();
  } catch(e){ toast('操作失敗：'+e.message,'error'); }
}

function confirmDeleteProject(id){
  const p = projects.find(x=>x.id===id); if(!p) return;
  document.getElementById('confirmTitle').textContent = '刪除專案';
  document.getElementById('confirmMsg').textContent   = `確定要刪除專案「${p.name}」嗎？`;
  document.getElementById('confirmSub').textContent   = '此操作無法復原，專案下的所有資料也將移除。';
  document.getElementById('confirmBtn').textContent   = '確認刪除';
  document.getElementById('confirmBtn').onclick = async ()=>{
    try {
      await apiFetchProj('DELETE', '/projects/'+id, id);
      closeModal('confirmModal');
      await loadData();
      toast('已刪除專案：'+p.name);
    } catch(e){ toast('刪除失敗：'+e.message,'error'); }
  };
  openModal('confirmModal');
}

function confirmDeleteUser(sys, id){
  const u = users.find(x=>x.id===id && x._sys===sys); if(!u) return;
  document.getElementById('confirmTitle').textContent = '刪除使用者';
  document.getElementById('confirmMsg').textContent   = `確定要刪除帳號「${u.username}」嗎？`;
  document.getElementById('confirmSub').textContent   = '此操作無法復原。';
  document.getElementById('confirmBtn').textContent   = '確認刪除';
  document.getElementById('confirmBtn').onclick = async ()=>{
    try {
      const dbase = sys==='lab' ? '/lab/users' : '/users';
      await apiFetchProj('DELETE', dbase+'/'+id, u.projectId||'Brinc');
      closeModal('confirmModal');
      await loadData();
      toast('已刪除帳號：'+u.username);
    } catch(e){ toast('刪除失敗：'+e.message,'error'); }
  };
  openModal('confirmModal');
}

function confirmRemoveUser(sys, id){
  const u = users.find(x=>x.id===id && x._sys===sys); if(!u) return;
  document.getElementById('confirmTitle').textContent = '移除使用者';
  document.getElementById('confirmMsg').textContent   = `確定要將「${u.name}」從此專案移除？`;
  document.getElementById('confirmSub').textContent   = '移除後此帳號將無法登入此專案。';
  document.getElementById('confirmBtn').textContent   = '確認移除';
  document.getElementById('confirmBtn').onclick = async ()=>{
    try {
      const dbase = sys==='lab' ? '/lab/users' : '/users';
      await apiFetchProj('DELETE', dbase+'/'+id, u.projectId||'Brinc');
      closeModal('confirmModal');
      await loadData();
      toast('已移除：'+u.name);
    } catch(e){ toast('移除失敗：'+e.message,'error'); }
  };
  openModal('confirmModal');
}

function exportProjects(){
  const rows = [['專案名稱','代碼','聯絡人','Email','狀態','使用者數','建立日期']];
  projects.forEach(p=>{
    const uc = users.filter(u=>u.projectId===p.id&&u.status==='啟用').length;
    rows.push([p.name,p.code,p.contact,p.email,p.status,uc,p.createdAt]);
  });
  const csv = rows.map(r=>r.map(v=>String(v||'').includes(',')? '"'+v+'"':String(v||'')).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'projects_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
}
function openModal(id){
  const el = document.getElementById(id); if(!el) return;
  el.classList.add('open');
}
function closeModal(id){
  const el = document.getElementById(id); if(!el) return;
  el.classList.remove('open');
}
function toast(msg, type){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.className = 'show' + (type ? ' '+type : '');
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.className=''; }, 3000);
}

</script>
